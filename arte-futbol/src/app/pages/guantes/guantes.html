<main id="main-content" tabindex="-1">
  <section class="hero" aria-labelledby="guantes-title">
    <h1 id="guantes-title">Guantes de Portero</h1>
    <p>Protección, agarre y durabilidad para todos los niveles.</p>
  </section>

  <div class="gloves-wrapper">
    <h2 class="gloves-title">Guantes Disponibles</h2>
    <p class="gloves-subtitle">Encuentra el modelo que mejor se adapte a tu estilo de juego.</p>

    <div class="gloves-grid" role="list" aria-label="Catálogo de guantes">
      <article class="gloves-card" *ngFor="let p of productos" role="listitem">
        <div class="equip-img-placeholder">
          <img [src]="p.imagen" [alt]="'Imagen de ' + p.nombre" loading="lazy">
        </div>
        <div class="gloves-info">
          <h3>{{ p.nombre }}</h3>
          <p>{{ p.descripcion }}</p>
          <p class="precio" aria-label="Precio: {{ p.precio | currency:'EUR':'symbol':'1.2-2' }}">
            {{ p.precio | currency:'EUR':'symbol':'1.2-2' }}
          </p>
          <button type="button" [attr.aria-label]="'Ver detalles de ' + p.nombre">Ver producto</button>
          <button type="button" class="btn-add-cart"
                  (click)="agregarAlCarrito(p.nombre, p.precio)"
                  [attr.aria-label]="'Añadir ' + p.nombre + ' al carrito'">
            🛒 Añadir al carrito
          </button>
        </div>
      </article>
    </div>
  </div>
</main>
