<main id="main-content" tabindex="-1">
  <section class="hero" aria-labelledby="botas-title">
    <h1 id="botas-title">Botas de Fútbol</h1>
    <p>Explora nuestra selección de botas para todo tipo de superficies.</p>
  </section>

  <div class="boots-wrapper">
    <h2 class="boots-title">Botas Disponibles</h2>
    <p class="boots-subtitle">Modelos diseñados para el máximo rendimiento y comodidad.</p>

    <div class="boots-grid" role="list" aria-label="Catálogo de botas">
      <article class="boots-card" *ngFor="let p of productos" role="listitem">
        <div class="equip-img-placeholder">
          <img [src]="p.imagen" [alt]="'Imagen de ' + p.nombre" loading="lazy">
        </div>
        <div class="boots-info">
          <h3>{{ p.nombre }}</h3>
          <p>{{ p.descripcion }}</p>
          <p class="precio" aria-label="Precio: {{ p.precio | currency:'EUR':'symbol':'1.2-2' }}">
            {{ p.precio | currency:'EUR':'symbol':'1.2-2' }}
          </p>
          <button type="button" [attr.aria-label]="'Ver detalles de ' + p.nombre">Ver producto</button>
          <button type="button" class="btn-add-cart"
                  (click)="agregarAlCarrito(p.nombre, p.precio)"
                  [attr.aria-label]="'Añadir ' + p.nombre + ' al carrito'">
            🛒 Añadir al carrito
          </button>
        </div>
      </article>
    </div>
  </div>
</main>
