<main id="main-content" tabindex="-1">
  <section class="hero" aria-labelledby="chandales-title">
    <h1 id="chandales-title">Chándales Deportivos</h1>
    <p>Comodidad, estilo y rendimiento en cada prenda.</p>
  </section>

  <div class="suits-wrapper">
    <h2 class="suits-title">Chándales Disponibles</h2>
    <p class="suits-subtitle">Ropa deportiva diseñada para entrenar y vestir con estilo.</p>

    <div class="suits-grid" role="list" aria-label="Catálogo de chándales">
      <article class="suits-card" *ngFor="let p of productos" role="listitem">
        <div class="equip-img-placeholder">
          <img [src]="p.imagen" [alt]="'Imagen de ' + p.nombre" loading="lazy">
        </div>
        <div class="suits-info">
          <h3>{{ p.nombre }}</h3>
          <p>{{ p.descripcion }}</p>
          <p class="precio" aria-label="Precio: {{ p.precio | currency:'EUR':'symbol':'1.2-2' }}">
            {{ p.precio | currency:'EUR':'symbol':'1.2-2' }}
          </p>
          <button type="button" [attr.aria-label]="'Ver detalles de ' + p.nombre">Ver producto</button>
          <button type="button" class="btn-add-cart"
                  (click)="agregarAlCarrito(p.nombre, p.precio)"
                  [attr.aria-label]="'Añadir ' + p.nombre + ' al carrito'">
            🛒 Añadir al carrito
          </button>
        </div>
      </article>
    </div>
  </div>
</main>
