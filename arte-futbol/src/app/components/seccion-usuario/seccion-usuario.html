<div class="login-container">
  <div class="login-card">
    <div class="tabs">
      <button class="tab-button active" data-tab="login" aria-pressed="true">Iniciar Sesión</button>
    </div>

    <form class="login-form active" id="loginForm" aria-labelledby="login-title" (ngSubmit)="validarLogin()">
      <h3 id="login-title">Iniciar Sesión</h3>

      <div class="form-group">
        <label for="loginUsuario">Email <span aria-hidden="true">*</span></label>
        <input type="email" id="loginUsuario" placeholder="tu@email.com" class="form-input"
          required aria-required="true" [(ngModel)]="email" name="email">
      </div>

      <div class="form-group">
        <label for="loginClave">Contraseña <span aria-hidden="true">*</span></label>
        <input type="password" id="loginClave" placeholder="Tu contraseña" class="form-input"
          required aria-required="true" [(ngModel)]="password" name="password">
      </div>

      <div *ngIf="mensajeValidacion" [class]="mensajeExito ? 'mensaje-validacion mensaje-exito' : 'mensaje-validacion mensaje-error'"
        role="alert" aria-live="polite">
        {{ mensajeValidacion }}
      </div>

      <button type="submit" id="btnLogin" class="btn btn-primary btn-full">Iniciar Sesión</button>

      <p style="text-align:center; margin-top:1rem; font-size:0.9rem;">
        ¿No tienes cuenta?
        <a routerLink="/registro-usuario" style="color:#0077cc;">Regístrate aquí</a>
      </p>
    </form>
  </div>
</div>
