<div class="login-container">
  <div class="login-card">
    <div class="tabs">
      <button class="tab-button active" data-tab="login" aria-pressed="true">Iniciar Sesión</button>
    </div>

    <form class="login-form active" id="loginForm" aria-labelledby="login-title">
      <h3 id="login-title">Bienvenido de nuevo</h3>
      
      <div class="form-group">
        <label for="loginUsuario">Usuario o Email <span aria-hidden="true">*</span></label>
        <input type="text" id="loginUsuario" placeholder="Ingresa tu usuario o email" class="form-input" required aria-required="true">
      </div>
      
      <div class="form-group">
        <label for="loginClave">Contraseña <span aria-hidden="true">*</span></label>
        <input type="password" id="loginClave" placeholder="Ingresa tu contraseña" class="form-input" required aria-required="true">
      </div>
      
      <div class="form-options">
        <div class="checkbox-container">
          <input type="checkbox" id="chkRecordar"> 
          <label for="chkRecordar" class="checkbox-label">Recordar sesión</label>
        </div>
        <a href="#" class="forgot-link" aria-label="Recuperar contraseña olvidada">¿Olvidaste tu contraseña?</a>
      </div>
      
      <div class="mensaje-validacion" id="mensajeValidacion" style="display: none;" aria-live="polite" role="alert">
      </div>
      
      <button type="submit" id="btnLogin" class="btn btn-primary btn-full">Ingresar</button>
    </form>
  </div>
</div>
