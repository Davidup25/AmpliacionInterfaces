<a href="#main-content" class="skip-link">Saltar al contenido principal</a>

<header>
  <nav class="navbar" aria-label="Navegación principal" role="navigation">

    <div class="logo">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
         aria-label="FutbolArte — Ir a la página de inicio">⚽ FutbolArte</a>
    </div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menú de navegación"
            aria-expanded="false" aria-controls="main-menu" (click)="toggleMenu()">
      <span aria-hidden="true">&#9776;</span>
    </button>

    <ul class="menu" id="main-menu" role="menubar" [attr.aria-hidden]="!menuAbierto">

      <!-- Buscador -->
      <li class="search-item" role="none">
        <div class="header-search" role="search">
          <label for="headerSearch" class="visually-hidden">Buscar productos</label>
          <input type="search" id="headerSearch" class="header-search-input"
                 placeholder="Buscar..." aria-label="Buscar productos"
                 [(ngModel)]="terminoBusqueda"
                 (keydown.enter)="buscar()">
          <button type="button" class="header-search-btn" aria-label="Buscar" (click)="buscar()">🔍</button>
        </div>
      </li>

      <!-- Categorías -->
      <li class="dropdown" role="none">
        <button class="dropbtn" role="menuitem" aria-haspopup="true"
                [attr.aria-expanded]="categoriasAbiertas"
                (click)="toggleCategorias()"
                (keydown.enter)="toggleCategorias()"
                (keydown.space)="toggleCategorias()">
          Categorías <span aria-hidden="true">▾</span>
        </button>
        <div class="dropdown-content" role="menu" [class.open]="categoriasAbiertas"
             aria-label="Subcategorías de productos">
          <a routerLink="/equipaciones" routerLinkActive="active" role="menuitem">Equipaciones</a>
          <a routerLink="/chandales"    routerLinkActive="active" role="menuitem">Chándales</a>
          <a routerLink="/botas"        routerLinkActive="active" role="menuitem">Botas</a>
          <a routerLink="/guantes"      routerLinkActive="active" role="menuitem">Guantes</a>
        </div>
      </li>

      <!-- Carrito -->
      <li class="cart-item" role="none">
        <button class="cart-btn" type="button" aria-label="Ver carrito de compra"
                (click)="toggleCarrito()">
          🛒
          <span class="cart-count" *ngIf="carritoCount > 0" aria-label="{{ carritoCount }} productos en el carrito">
            {{ carritoCount }}
          </span>
        </button>
        <div class="carrito-panel" [class.carrito-visible]="carritoAbierto"
             role="dialog" aria-label="Carrito de compra" aria-modal="true">
          <div class="carrito-header">
            <h2>🛒 Carrito</h2>
            <button type="button" class="cerrar-carrito" (click)="toggleCarrito()" aria-label="Cerrar carrito">✕</button>
          </div>
          <div class="carrito-body">
            <p *ngIf="carritoItems.length === 0" class="carrito-vacio">Tu carrito está vacío.</p>
            <ul *ngIf="carritoItems.length > 0" class="carrito-lista" aria-label="Productos en el carrito">
              <li *ngFor="let item of carritoItems; let i = index" class="carrito-linea">
                <span class="item-nombre">{{ item.nombre }}</span>
                <span class="item-precio">{{ item.precio }} €</span>
                <button type="button" class="item-eliminar"
                        (click)="eliminarItem(i)"
                        [attr.aria-label]="'Eliminar ' + item.nombre + ' del carrito'">✕</button>
              </li>
            </ul>
            <div *ngIf="carritoItems.length > 0" class="carrito-total">
              <strong>Total: {{ carritoTotal }} €</strong>
            </div>
            <button *ngIf="carritoItems.length > 0" type="button" class="btn-comprar"
                    aria-label="Proceder al pago">
              Comprar ahora
            </button>
          </div>
        </div>
      </li>

      <!-- Usuario -->
      <li class="dropdownUser" role="none">
        <button class="dropbtnUser" role="menuitem" aria-haspopup="true"
                [attr.aria-expanded]="usuarioAbierto"
                aria-label="Menú de usuario"
                (click)="toggleUsuario()"
                (keydown.enter)="toggleUsuario()"
                (keydown.space)="toggleUsuario()">
          <span aria-hidden="true">👤</span>
          <span *ngIf="!usuarioActual">Mi cuenta</span>
          <span *ngIf="usuarioActual">{{ usuarioActual.nombre }}</span>
          <span aria-hidden="true">▾</span>
        </button>
        <div class="dropdownUser-content" role="menu" aria-label="Opciones de cuenta"
             [class.open]="usuarioAbierto">
          <ng-container *ngIf="!usuarioActual">
            <a routerLink="/seccion-usuario"  routerLinkActive="active" role="menuitem">Iniciar sesión</a>
            <a routerLink="/registro-usuario" routerLinkActive="active" role="menuitem">Registrarse</a>
          </ng-container>
          <ng-container *ngIf="usuarioActual">
            <span class="menu-saludo" role="menuitem" aria-label="Usuario conectado: {{ usuarioActual.nombre }}">
              Hola, {{ usuarioActual.nombre }}
            </span>
            <button type="button" class="btn-cerrar-sesion" role="menuitem"
                    (click)="cerrarSesion()" aria-label="Cerrar sesión">
              Cerrar sesión
            </button>
          </ng-container>
        </div>
      </li>

    </ul>
  </nav>
</header>
